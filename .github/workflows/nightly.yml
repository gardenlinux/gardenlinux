name: nightly
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-nightly
  cancel-in-progress: true
on:
  schedule:
    - cron: '0 4 * * *'
      timezone: "Europe/Berlin"
jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    permissions:
      id-token: write # TODO: 3215 elevated permissions for included workflow
      actions: write # TODO: 3215 elevated permissions for included workflow
      packages: write # TODO: 3215 elevated permissions for included workflow
    with:
      version: now
      target: nightly
      fail_fast: true
    secrets:
      aws_region: ${{ secrets.AWS_REGION }}
      aws_kms_role: ${{ secrets.KMS_SIGNING_IAM_ROLE }}
      aws_oidc_session: ${{ secrets.AWS_OIDC_SESSION }}
      secureboot_db_kms_arn: ${{ secrets.SECUREBOOT_DB_KMS_ARN }}

  build_retry:
    needs: build
    if: ${{ failure() && needs.build.result == 'failure' }}
    name: "Retry checkpoint: Build"
    runs-on: ubuntu-24.04
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Retry failed build
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const gitHubLib = await import("${{ github.workspace }}/.github/workflows/github.mjs");

            const gitHubRef = "${{ github.head_ref == '' && github.ref_name || github.head_ref }}";
            return await gitHubLib.dispatchRetryWorkflow(core, github.rest.actions, context, gitHubRef, 5);

  test:
    needs: build
    name: Test
    uses: ./.github/workflows/tests.yml
    with:
      flavors_matrix: ${{ needs.build.outputs.flavors_matrix }}
      bare_flavors_matrix: ${{ needs.build.outputs.bare_flavors_matrix }}
      test_types: "chroot,qemu,cloud,oci,bare"
    permissions:
      id-token: write # TODO: 3215 elevated permissions for included workflow
      actions: write # TODO: 3215 elevated permissions for included workflow
      checks: write # Required for test_report job to write workflow summary
    secrets:
      gcp_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      gcp_project_id: ${{ secrets.GCP_PROJECT }}
      gcp_region: ${{ secrets.GCP_REGION }}
      gcp_zone: ${{ secrets.GCP_ZONE }}
      aws_role: ${{ secrets.AWS_TESTS_IAM_ROLE }}
      aws_session: ${{ secrets.AWS_TESTS_OIDC_SESSION }}
      aws_region: ${{ secrets.AWS_TESTS_REGION }}
      aws_s3_bucket: ${{ secrets.AWS_S3_BUCKET }}
      az_client_id: ${{ secrets.AZURE_CLIENT_ID }}
      az_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      az_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      alibaba_cloud_role_arn: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
      alibaba_cloud_oidc_provider_arn: ${{ secrets.ALIBABA_CLOUD_OIDC_PROVIDER_ARN }}
      alibaba_cloud_region: ${{ secrets.ALIBABA_CLOUD_REGION }}
      tf_encryption: ${{ secrets.TF_ENCRYPTION }}

  test_retry:
    needs: test
    if: ${{ failure() && needs.test.result == 'failure' }}
    name: "Retry checkpoint: Test"
    runs-on: ubuntu-24.04
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Retry failed test
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const gitHubLib = await import("${{ github.workspace }}/.github/workflows/github.mjs");

            const gitHubRef = "${{ github.head_ref == '' && github.ref_name || github.head_ref }}";
            return await gitHubLib.dispatchRetryWorkflow(core, github.rest.actions, context, gitHubRef, 3);

  upload_workflow_data:
    needs: [build, test]
    name: Store workflow data
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Store data in JSON file
        run: |
          jq -r --arg 'matrix' '${{ needs.build.outputs.flavors_matrix }}' --arg 'bare_matrix' '${{ needs.build.outputs.bare_flavors_matrix }}' -n '{
            "id": ${{ github.run_id }},
            "flavors_matrix": $matrix,
            "bare_flavors_matrix": $bare_matrix,
            "version": "${{ needs.build.outputs.version }}",
            "original_workflow_name": "${{ github.workflow }}"
          }' '.' > workflow_data.json
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # pin@v7.0.0
        with:
          name: workflow-data
          path: workflow_data.json
          if-no-files-found: error

  publish_ghcr:
    needs: upload_workflow_data
    name: Publish nightly to ghcr.io
    uses: ./.github/workflows/publish.yml
    with:
      run_id: ${{ github.run_id }}
    permissions:
      actions: write # TODO: 3215 elevated permissions for included workflow
      id-token: write # TODO: 3215 elevated permissions for included workflow
      packages: write # TODO: 3215 elevated permissions for included workflow
    secrets: inherit

  publish_s3:
    needs: upload_workflow_data
    name: Publish nightly to S3
    uses: ./.github/workflows/publish_s3.yml
    with:
      run_id: ${{ github.run_id }}
    permissions:
      actions: write # TODO: 3215 elevated permissions for included workflow
      id-token: write # TODO: 3215 elevated permissions for included workflow
    secrets: inherit

  create_issue_on_failure:
    name: Create issue on failure
    needs:
      - build
      - test
      - upload_workflow_data
      - publish_ghcr
      - publish_s3
    if: ${{ always() && failure() }}
    runs-on: ubuntu-24.04
    permissions:
      issues: write
      contents: read
    env:
      NEEDS_JSON: ${{ toJson(needs) }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Compare apt repository versions
        id: compare_versions
        run: |
          today=$(date +%Y%m%d)
          yesterday=$(date -d "yesterday" +%Y%m%d)
          new_version=$(./bin/garden-version "$today")
          old_version=$(./bin/garden-version "$yesterday")
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "old_version=$old_version" >> "$GITHUB_OUTPUT"
          {
            echo 'compare_output<<EOF'
            ./hack/compare-apt-repo-versions.sh "$new_version" "$old_version" || echo "Failed to run ./hack/compare-apt-repo-versions.sh $new_version $old_version"
            echo EOF
          } >> "$GITHUB_OUTPUT"
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          COMPARE_OUTPUT: ${{ steps.compare_versions.outputs.compare_output }}
          NEW_VERSION: ${{ steps.compare_versions.outputs.new_version }}
          OLD_VERSION: ${{ steps.compare_versions.outputs.old_version }}
        with:
          script: |
            const needs = JSON.parse(process.env.NEEDS_JSON);
            const failedNeeds = Object.entries(needs).filter(([_, data]) => data.result === 'failure');
            const date = new Date().toISOString().split('T')[0];
            const title = `Nightly workflow failed on ${date} (run #${{ github.run_id }})`;
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            let body = `## Nightly workflow failed\n\n`;
            body += `A summary of the failure is provided below. See the [workflow run](${runUrl}) for full details.\n\n`;
            body += `| | |\n`;
            body += `|---|---|\n`;
            body += `| **Workflow** | ${context.workflow} |\n`;
            body += `| **Run** | ${runUrl} |\n`;
            body += `| **Ref** | ${context.ref} |\n`;
            body += `| **SHA** | ${context.sha} |\n\n`;

            body += `### Failed jobs\n\n`;
            if (failedNeeds.length > 0) {
              for (const [name, data] of failedNeeds) {
                body += `- **${name}**: ${data.result}\n`;
              }
            } else {
              body += `- No individual job reported a failure result, but the overall workflow failed.\n`;
            }

            const { data: jobsData } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            const failedJobs = jobsData.jobs.filter(job => job.conclusion === 'failure');

            const apiHeaders = {
              'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
            };

            const getLastLogLines = async (jobId) => {
              try {
                const resp = await fetch(
                  `https://api.github.com/repos/${context.repo.owner}/${context.repo.repo}/actions/jobs/${jobId}/logs`,
                  { headers: apiHeaders, redirect: 'manual' }
                );
                let logText;
                if (resp.status === 302 && resp.headers.get('location')) {
                  const logResp = await fetch(resp.headers.get('location'));
                  logText = await logResp.text();
                } else if (resp.ok) {
                  logText = await resp.text();
                } else {
                  return `Unable to fetch logs (HTTP ${resp.status}).`;
                }
                const lines = logText.split('\n').filter(line => line !== '');
                const lastLines = lines.slice(-10);
                return lastLines.length > 0 ? lastLines.join('\n') : '(no log output)';
              } catch (err) {
                return `Error retrieving logs: ${err.message}`;
              }
            };

            if (failedJobs.length > 0) {
              body += `\n### Failed job logs (last 10 lines)\n\n`;
              for (const job of failedJobs) {
                const last10 = await getLastLogLines(job.id);
                body += `<details>\n`;
                body += `<summary><b>${job.name}</b></summary>\n\n`;
                body += '```\n';
                body += last10;
                body += '\n```\n\n';
                body += `</details>\n\n`;
              }
            }

            const oneDayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            const { data: pullsData } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 100,
            });

            const recentlyMerged = pullsData.filter(pr => pr.merged_at && pr.merged_at >= oneDayAgo);

            body += `\n### Pull requests merged in the last 24 hours\n\n`;
            if (recentlyMerged.length > 0) {
              for (const pr of recentlyMerged) {
                body += `- #${pr.number} [${pr.title}](${pr.html_url}) by @${pr.user.login} (merged at ${pr.merged_at})\n`;
              }
            } else {
              body += `- No pull requests were merged in the last 24 hours.\n`;
            }

            body += `\n### Apt packages updated since yesterday's nightly run\n\n`;
            body += `<details>\n`;
            body += `<summary>Click to expand output of <code>./hack/compare-apt-repo-versions.sh ${process.env.NEW_VERSION} ${process.env.OLD_VERSION}</code></summary>\n\n`;
            body += '```\n';
            body += process.env.COMPARE_OUTPUT || '(no output)';
            body += '\n```\n\n';
            body += `</details>\n\n`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
            });
