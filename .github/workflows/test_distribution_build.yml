name: test_flavor
on:
  workflow_call:
jobs:
  test:
    name: Build and Cache Test Distribution
    runs-on: "ubuntu-24.04"
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - name: install dependencies
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends podman make curl jq unzip qemu-utils
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # pin@v5.0.0
        with:
          submodules: true
      - name: Build Test Distribution
        run: |
          cd tests-ng
          make -f util/build.makefile
      - uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # pin@v4.2.4
        with:
          path: |
            tests-ng/.build
          key: test-dist-${{ github.run_id }}
