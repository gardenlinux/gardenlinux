name: upload to S3
on:
  workflow_call:
    inputs:
      commit_id:
        type: string
        required: true
      version:
        type: string
        required: true
      flavors_matrix:
        type: string
        required: true
      run_id:
        type: string
        required: true
      release_id:
        type: string
        required: true
      with_certs:
        type: boolean
        default: false
      compatibility_flags:
        description: 'Flags to activate compatibility modes'
        type: string
        default: ''
    secrets:
      aws_role:
        required: true
      aws_session:
        required: true
      aws_region:
        required: true
      aws_s3_bucket:
        required: true
env:
  GL_COMPATIBILITY_FLAGS: ${{ inputs.compatibility_flags }}
jobs:
  upload_to_github_release:
    name: Upload artifacts to a GitHub release
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    env:
      CNAME: ""
      GL_ALLOW_MULTIPLE_PLATFORMS: "1"
    permissions:
      id-token: write
      contents: write
    environment: oidc_aws_s3_upload
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.flavors_matrix) }}
      max-parallel: 8
    steps:
      - if: ${{ contains(inputs.compatibility_flags, 'full_checkout') }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.commit_id }}
          submodules: true
      - name: Install python-gardenlinux-lib
        uses: gardenlinux/python-gardenlinux-lib/.github/actions/setup@3e2802f425fd877c5b632094fb6ce71f5334b567 # pin@0.10.20
      - uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # pin@v4
        with:
          role-to-assume: ${{ secrets.aws_role }}
          role-session-name: ${{ secrets.aws_session }}
          aws-region: ${{ secrets.aws_region }}
          role-duration-seconds: 14400 # 4 hours
      - name: Set CNAME
        run: |
          echo "CNAME=$(gl-features-parse --cname ${{ matrix.flavor }} --arch ${{ matrix.arch }} --version ${{ inputs.version }} --commit ${{ inputs.commit_id }} cname)" | tee -a "$GITHUB_ENV"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pin@v8.0.1
        with:
          name: build-${{ matrix.flavor }}-${{ matrix.arch }}
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run_id }}
      - name: Load test artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pin@v8.0.1
        with:
          pattern: "*-+(test|testng)-${{ env.CNAME }}"
          merge-multiple: true
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run_id }}
          path: log/
      - if: ${{ inputs.with_certs }}
        name: Load certs artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pin@v8.0.1
        with:
          name: certs
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run_id }}
          path: cert/
      - name: Prepare upload artifacts
        run: |
          mkdir -p "$CNAME"

          gunzip "$CNAME.tar.gz"
          xz -1 "$CNAME.tar"
          mv "$CNAME.tar.xz" "$CNAME/"

          tar -C "log" -cJf "$CNAME/$CNAME.logs.tar.xz" .

          # Certificates if "with_certs"
          if [ -d "cert" ]; then
            mkdir release_cert

            pushd cert
            for file in "secureboot."*; do
              mv "$file" "../release_cert/$CNAME.$file"
            done
            popd

            tar -C "release_cert" -cJf "$CNAME/$CNAME.certs.tar.xz" .
          fi
      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pushd "$CNAME"
          for file in *; do
            gl-gh-release upload --release_id "${{ inputs.release_id }}" --file_path "$file" --overwrite-same-name
          done
          popd
