# @TODO: Replace with safe OCI manifast handling variant
name: publish_oci_containers
on:
  workflow_call:
    inputs:
      run_id:
        type: string
        required: true
      commit_id:
        type: string
        required: true
      version:
        type: string
        required: true
      target:
        type: string
        required: true
      flavors_matrix:
        type: string
        required: true
      bare_flavors_matrix:
        type: string
        default: '{"include":[]}'
      original_workflow_name:
        type: string
        default: ''
      compatibility_flags:
        description: 'Flags to activate compatibility modes'
        type: string
        default: ''
    secrets:
      aws_role:
        required: true
      aws_session:
        required: true
      aws_region:
        required: true
      oci_kms_arn:
        required: true
env:
  GL_COMPATIBILITY_FLAGS: ${{ inputs.compatibility_flags }}
jobs:
  determine_environment:
    name: Determine release environment and repository for ${{ inputs.target }}
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set_values.outputs.environment }}
      repository: ${{ steps.set_values.outputs.repository }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            .github/**
          sparse-checkout-cone-mode: false
      - name: Set environment and repository
        id: set_values
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const gitHubLib = await import("${{ github.workspace }}/.github/workflows/github.mjs");

            core.setOutput("environment", gitHubLib.getGitHubSigningEnvironmentFromTarget("${{ inputs.target }}"));
            const repository = gitHubLib.getGHCRRepositoryFromTarget("${{ inputs.target }}");

            if (repository == "") {
              core.setFailed("Invalid release target ${{ inputs.target }}");
              return false;
            }

            core.setOutput("repository", repository);

            return true;
  container:
    needs: determine_environment
    name: Publish container images
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          - flavor: "container"
            subpath: ""
          - flavor: "container-pythonDev"
            subpath: "/container-python-dev"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.commit_id }}
          submodules: true
      - name: Install python-gardenlinux-lib
        uses: gardenlinux/python-gardenlinux-lib/.github/actions/setup@e68236134acc7416606052599f4cfab7b9ea3b7c # pin@0.10.14
      - name: Set container version reference
        run: |
          echo "${{ inputs.commit_id }}" | tee COMMIT
          echo "${{ inputs.version }}" | tee VERSION
      - name: Install python-gardenlinux-lib
        uses: gardenlinux/python-gardenlinux-lib/.github/actions/setup@19c1b24c01faab81a7fe24713748dd172d00904a # pin@0.10.16
        with:
          version: 33fce174d889a4eef5aede1686a21e76d6de4524
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pin@v8.0.1
        with:
          name: build-${{ matrix.flavor }}-amd64
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run_id }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pin@v8.0.1
        with:
          name: build-${{ matrix.flavor }}-arm64
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run_id }}
      - name: Set CNAMEs
        run: |
          echo "CNAME_AMD64=$(gl-features-parse --cname ${{ matrix.flavor }} --arch amd64 --version ${{ inputs.version }} --commit ${{ inputs.commit_id }} cname)" | tee -a "$GITHUB_ENV"
          echo "CNAME_ARM64=$(gl-features-parse --cname ${{ matrix.flavor }} --arch arm64 --version ${{ inputs.version }} --commit ${{ inputs.commit_id }} cname)" | tee -a "$GITHUB_ENV"
      - name: Publish container images
        env:
          GL_CLI_REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GL_CLI_REGISTRY_USERNAME: ${{ github.repository_owner }}
        run: |
          CNAME_AMD64="$(gl-features-parse --cname container-amd64 cname)"
          CNAME_ARM64="$(gl-features-parse --cname container-arm64 cname)"
          CNAMES="${CNAME_AMD64} ${CNAME_ARM64}"

          if [ "${{ inputs.original_workflow_name }}" = "nightly" ]; then
            IS_NIGHTLY=true
          else
            IS_NIGHTLY=false
          fi

          VERSION=$(cat VERSION)

          # Creating and pushing manifest for version tag
          gh-oci new-index --index "${{ needs.determine_environment.outputs.repository }}" --index-tag "${VERSION}"

          # Creating and pushing manifest for nightly
          if [ $IS_NIGHTLY = true ]; then
            gh-oci new-index --index "${{ needs.determine_environment.outputs.repository }}" --index-tag nightly
          fi

          for cname in $CNAMES; do
            tar xzv < "${cname}.tar.gz"

            ARCH="$(gl-features-parse --cname "${cname}" arch)"
            IMAGE_ID="$(gl-oci load-container --oci_archive "${cname}.oci" | awk '{ print $NF }')"

            # Tagging with version
            gl-oci tag-container --container "${IMAGE_ID}" --additional_tag "${{ needs.determine_environment.outputs.repository }}:${ARCH}-${VERSION}"
            gl-oci push-container --container "${{ needs.determine_environment.outputs.repository }}" --tag "${ARCH}-${VERSION}"

            # Tagging for nightly
            if [ $IS_NIGHTLY = true ]; then
              gl-oci tag-container --container "${IMAGE_ID}" --additional_tag "${{ needs.determine_environment.outputs.repository }}:${ARCH}-nightly"
              gl-oci push-container --container "${{ needs.determine_environment.outputs.repository }}" --tag "${ARCH}-nightly"
            fi

            # Image index handling
            gl-oci add-container-to-index --index "${{ needs.determine_environment.outputs.repository }}" --index-tag "${VERSION}" --container "${{ needs.determine_environment.outputs.repository }}" --tag "${ARCH}-${VERSION}"

            if [ $IS_NIGHTLY = true ]; then
              gl-oci add-container-to-index --index "${{ needs.determine_environment.outputs.repository }}" --index-tag nightly --container "${{ needs.determine_environment.outputs.repository }}" --tag "${ARCH}-nightly"
            fi
          done
  bare_flavors:
    needs: determine_environment
    name: Publish bare flavors
    if: ${{ inputs.bare_flavors_matrix != '{"include":[]}' }}
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        # @TODO: Replace with input matrix once OCI manifest tooling is ready to update existing ones
        config: [libc, python, nodejs, sapmachine]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.commit_id }}
          sparse-checkout: |
            bin/**
          sparse-checkout-cone-mode: false
      - name: Install python-gardenlinux-lib
        uses: gardenlinux/python-gardenlinux-lib/.github/actions/setup@d64300c48bf9a0a262642b564c7aeea0b89be21f # pin@0.10.5
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pin@v8.0.1
        with:
          pattern: build-bare-${{ matrix.config }}-*
          merge-multiple: true
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run_id }}
      - name: Publish bare flavor image ${{ matrix.config }} (${{ matrix.arch }})
        env:
          GL_CLI_REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GL_CLI_REGISTRY_USERNAME: ${{ github.repository_owner }}
        run: |
          ARCHS="amd64 arm64"

          if [ "${{ inputs.original_workflow_name }}" = "nightly" ]; then
            IS_NIGHTLY=true
          else
            IS_NIGHTLY=false
          fi

          VERSION=$(bin/garden-version "${{ inputs.version }}")

          # Creating and pushing manifest for version tag
          gh-oci new-index --index "${{ needs.determine_environment.outputs.repository }}/bare-${{ matrix.config }}" --index-tag "${VERSION}"

          # Creating and pushing manifest for nightly
          if [ $IS_NIGHTLY = true ]; then
            gh-oci new-index --index "${{ needs.determine_environment.outputs.repository }}/bare-${{ matrix.config }}" --index-tag nightly
          fi

          for ARCH in $ARCHS; do
            IMAGE_ID="$(gl-oci load-container --oci_archive "${{ matrix.config }}-${ARCH}.oci" | awk '{ print $NF }')"

            # Tagging with version
            gl-oci tag-container --container "${IMAGE_ID}" --additional_tag "${{ needs.determine_environment.outputs.repository }}/bare-${{ matrix.config }}:${ARCH}-${VERSION}"
            gl-oci push-container --container "${{ needs.determine_environment.outputs.repository }}/bare-${{ matrix.config }}" --tag "${ARCH}-${VERSION}"

            # Tagging for nightly
            if [ $IS_NIGHTLY = true ]; then
              gl-oci tag-container --container "${IMAGE_ID}" --additional_tag "${{ needs.determine_environment.outputs.repository }}/bare-${{ matrix.config }}:${ARCH}-nightly"
              gl-oci push-container --container "${{ needs.determine_environment.outputs.repository }}/bare-${{ matrix.config }}" --tag "${ARCH}-nightly"
            fi

            # Image index handling
            gl-oci add-container-to-index --index "${{ needs.determine_environment.outputs.repository }}/bare-${{ matrix.config }}" --index-tag "${VERSION}" --container "${{ needs.determine_environment.outputs.repository }}/bare-${{ matrix.config }}" --tag "${ARCH}-${VERSION}"

            if [ $IS_NIGHTLY = true ]; then
              gl-oci add-container-to-index --index "${{ needs.determine_environment.outputs.repository }}/bare-${{ matrix.config }}" --index-tag nightly --container "${{ needs.determine_environment.outputs.repository }}/bare-${{ matrix.config }}" --tag "${ARCH}-nightly"
            fi
          done
  push_flavors:
    needs: determine_environment
    name: Publish flavors
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    env:
      CNAME: ""
      GL_ALLOW_MULTIPLE_PLATFORMS: "1"
    permissions:
      id-token: write
      packages: write
    environment: ${{ needs.determine_environment.outputs.environment }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.flavors_matrix) }}
      max-parallel: 8
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.commit_id }}
          submodules: true
      - uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # pin@v4
        with:
          role-to-assume: ${{ secrets.aws_role }}
          role-session-name: ${{ secrets.aws_session }}
          aws-region: ${{ secrets.aws_region }}
      - name: Install python-gardenlinux-lib
        uses: gardenlinux/python-gardenlinux-lib/.github/actions/setup@19c1b24c01faab81a7fe24713748dd172d00904a # pin@0.10.16
        with:
          version: 33fce174d889a4eef5aede1686a21e76d6de4524
      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0
        with:
          cosign-release: "v2.4.1"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pin@v8.0.1
        with:
          name: build-${{ matrix.flavor }}-${{ matrix.arch }}
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run_id }}
      - name: Set CNAME
        run: |
          echo "CNAME=$(gl-features-parse --cname ${{ matrix.flavor }} --arch ${{ matrix.arch }} --version ${{ inputs.version }} --commit ${{ inputs.commit_id }} cname)" | tee -a "$GITHUB_ENV"
      - name: Push using the gl-oci util
        env:
          GL_CLI_REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GL_CLI_REGISTRY_USERNAME: ${{ github.repository_owner }}
        run: |
          mkdir "$CNAME"

          tar -C "$CNAME" -xzf "$CNAME.tar.gz"

          gl-oci push-manifest \
            --dir "${CNAME}" \
            --container ${{ needs.determine_environment.outputs.repository }} \
            --arch ${{ matrix.arch }} \
            --version ${{ inputs.version }} \
            --cname "${CNAME}" \
            --cosign_file digest.txt \
            --manifest_file "oci_manifest_entry_${CNAME}.json"
      - name: Sign the manifest
        run: |
          cat digest.txt
          docker login ghcr.io -u token -p ${{ github.token }}
          cosign sign -tlog-upload=false --key "awskms://kms.${{ secrets.aws_region }}.amazonaws.com/${{ secrets.oci_kms_arn }}" "${{ needs.determine_environment.outputs.repository }}@$(cat digest.txt)"
      - name: Verify signature
        run: |
          cosign verify --insecure-ignore-tlog=true --key "awskms://kms.${{ secrets.aws_region }}.amazonaws.com/${{ secrets.oci_kms_arn }}" "${{ needs.determine_environment.outputs.repository }}@$(cat digest.txt)"
      - uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # pin@v5.0.3
        with:
          path: oci_manifest_entry_${{ env.CNAME }}.json
          key: oci-manifest-${{ matrix.flavor }}-${{ matrix.arch }}-${{ github.run_id }}
  update_manifest_index:
    needs: [determine_environment, push_flavors]
    name: Update OCI manifest index
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    env:
      CNAME: ""
      GL_ALLOW_MULTIPLE_PLATFORMS: "1"
    permissions:
      id-token: write
      packages: write
      actions: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.flavors_matrix) }}
      max-parallel: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.commit_id }}
          submodules: true
      - name: Install python-gardenlinux-lib
        uses: gardenlinux/python-gardenlinux-lib/.github/actions/setup@19c1b24c01faab81a7fe24713748dd172d00904a # pin@0.10.16
        with:
          version: 33fce174d889a4eef5aede1686a21e76d6de4524
      - name: Set CNAME
        run: |
          echo "CNAME=$(gl-features-parse --cname ${{ matrix.flavor }} --arch ${{ matrix.arch }} --version ${{ inputs.version }} --commit ${{ inputs.commit_id }} cname)" | tee -a "$GITHUB_ENV"
      - uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # pin@v5.0.3
        with:
          path: oci_manifest_entry_${{ env.CNAME }}.json
          key: oci-manifest-${{ matrix.flavor }}-${{ matrix.arch }}-${{ github.run_id }}
      - name: Update index using gl-oci tool
        env:
          GL_CLI_REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GL_CLI_REGISTRY_USERNAME: ${{ github.repository_owner }}
        run: |
          mkdir manifests
          mv oci_manifest_entry_${CNAME}.json manifests/

          gl-oci push-index-from-directory \
            --index ${{ needs.determine_environment.outputs.repository }} \
            --index-tag ${{ inputs.version }} \
            --manifest_folder manifests
  publish_tests:
    name: Publish tests container
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    permissions:
      packages: write
    steps:
      - id: tests_containers
        name: Download built tests archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pin@v8.0.1
        with:
          pattern: tests-container-*
          merge-multiple: true
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run_id }}
      - if: ${{ steps.tests_containers.outputs.cache-hit == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - if: ${{ steps.tests_containers.outputs.cache-hit == 'true' }}
        name: Install python-gardenlinux-lib
        uses: gardenlinux/python-gardenlinux-lib/.github/actions/setup@19c1b24c01faab81a7fe24713748dd172d00904a # pin@0.10.16
        with:
          version: 33fce174d889a4eef5aede1686a21e76d6de4524
      - if: ${{ steps.tests_containers.outputs.cache-hit == 'true' }}
        name: Set container version reference
        run: |
          echo "${{ inputs.commit_id }}" | tee COMMIT
          echo "${{ inputs.version }}" | tee VERSION
      - if: ${{ steps.tests_containers.outputs.cache-hit == 'true' }}
        name: Publish tests images and manifest
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ARCHS="amd64 arm64"

          if [ "${{ inputs.original_workflow_name }}" = "nightly" ]; then
            IS_NIGHTLY=true
          else
            IS_NIGHTLY=false
          fi

          VERSION=$(bin/garden-version "${{ inputs.version }}")

          # Creating and pushing manifest for version tag
          gh-oci new-index --index "ghcr.io/${{ github.repository_owner }}/test" --index-tag "${VERSION}"

          # Creating and pushing manifest for nightly
          if [ $IS_NIGHTLY = true ]; then
            gh-oci new-index --index "ghcr.io/${{ github.repository_owner }}/test" --index-tag nightly
          fi

          for ARCH in $ARCHS; do
            IMAGE_ID="$(gl-oci load-container --oci_archive "tests_container_${ARCH}.oci" | awk '{ print $NF }')"

            # Tagging with version
            gl-oci tag-container --container "${IMAGE_ID}" --additional_tag "ghcr.io/${{ github.repository_owner }}/test:${ARCH}-${VERSION}"
            gl-oci push-container --container "ghcr.io/${{ github.repository_owner }}/test" --tag "${ARCH}-${VERSION}"

            # Tagging for nightly
            if [ $IS_NIGHTLY = true ]; then
              gl-oci tag-container --container "${IMAGE_ID}" --additional_tag "ghcr.io/${{ github.repository_owner }}/test:${ARCH}-nightly"
              gl-oci push-container --container "ghcr.io/${{ github.repository_owner }}/test" --tag "${ARCH}-nightly"
            fi

            # Image index handling
            gl-oci add-container-to-index --index "ghcr.io/${{ github.repository_owner }}/test" --index-tag "${VERSION}" --container "ghcr.io/${{ github.repository_owner }}/test" --tag "${ARCH}-${VERSION}"

            if [ $IS_NIGHTLY = true ]; then
              gl-oci add-container-to-index --index "ghcr.io/${{ github.repository_owner }}/test" --index-tag nightly --container "ghcr.io/${{ github.repository_owner }}/test" --tag "${ARCH}-nightly"
            fi
          done
