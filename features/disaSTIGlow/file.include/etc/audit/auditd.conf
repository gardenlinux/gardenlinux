# https://stigaview.com/products/srg-gpos/v3r2/SRG-OS-000343-GPOS-00134/
action_mail_acct = root

space_left = 100
admin_space_left = 50

# When disk is critically low (admin threshold)
admin_space_left_action = halt

# When disk is completely full
disk_full_action = halt

# When disk errors occur
disk_error_action = halt

# Ensure logs are not silently overwritten
max_log_file_action = rotate

# Optional but recommended for stability
num_logs = 5
